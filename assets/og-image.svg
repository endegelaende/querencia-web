<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbf5"/>
      <stop offset="100%" stop-color="#fef3ed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c75230"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <linearGradient id="terracotta-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c75230" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c75230" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round-terminal">
      <rect x="640" y="175" width="480" height="280" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle geometric decoration top-right -->
  <circle cx="1100" cy="80" r="200" fill="url(#terracotta-fade)"/>
  <circle cx="150" cy="550" r="250" fill="url(#terracotta-fade)"/>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- Left side content -->

  <!-- "QUERENCIA" wordmark -->
  <g transform="translate(80, 160)">
    <!-- Q -->
    <path d="M1507 711Q1507 429 1368.5 241.5Q1230 54 983 4Q1017 -95 1078.5 -139.0Q1140 -183 1251 -183Q1310 -183 1370 -173L1368 -375Q1242 -403 1126 -403Q963 -403 856.0 -312.0Q749 -221 684 -10Q399 17 241.5 207.5Q84 398 84 711Q84 1050 272.0 1240.0Q460 1430 795 1430Q1130 1430 1318.5 1238.0Q1507 1046 1507 711ZM1206 711Q1206 939 1098.0 1068.5Q990 1198 795 1198Q597 1198 489.0 1069.5Q381 941 381 711Q381 479 491.0 345.0Q601 211 793 211Q991 211 1098.5 341.0Q1206 471 1206 711Z" transform="translate(0,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- U -->
    <path d="M723 -20Q432 -20 277.5 122.0Q123 264 123 528V1409H418V551Q418 384 497.5 297.5Q577 211 731 211Q889 211 974.0 301.5Q1059 392 1059 561V1409H1354V543Q1354 275 1188.5 127.5Q1023 -20 723 -20Z" transform="translate(42,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- E -->
    <path d="M137 0V1409H1245V1181H432V827H1184V599H432V228H1286V0Z" transform="translate(82,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- R -->
    <path d="M1105 0 778 535H432V0H137V1409H841Q1093 1409 1230.0 1300.5Q1367 1192 1367 989Q1367 841 1283.0 733.5Q1199 626 1056 592L1437 0ZM1070 977Q1070 1180 810 1180H432V764H818Q942 764 1006.0 820.0Q1070 876 1070 977Z" transform="translate(120,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- E -->
    <path d="M137 0V1409H1245V1181H432V827H1184V599H432V228H1286V0Z" transform="translate(160,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- N -->
    <path d="M995 0 381 1085Q399 927 399 831V0H137V1409H474L1097 315Q1079 466 1079 590V1409H1341V0Z" transform="translate(198,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- C -->
    <path d="M795 212Q1062 212 1166 480L1423 383Q1340 179 1179.5 79.5Q1019 -20 795 -20Q455 -20 269.5 172.5Q84 365 84 711Q84 1058 263.0 1244.0Q442 1430 782 1430Q1030 1430 1186.0 1330.5Q1342 1231 1405 1038L1145 967Q1112 1073 1015.5 1135.5Q919 1198 788 1198Q588 1198 484.5 1074.0Q381 950 381 711Q381 468 487.5 340.0Q594 212 795 212Z" transform="translate(238,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- I -->
    <path d="M137 0V1409H432V0Z" transform="translate(278,0) scale(0.024,-0.024)" fill="#C75230"/>
    <!-- A -->
    <path d="M51 0 L739 1409 L1425 0 L1130 0 L739 1020 L346 0 Z M600 0 L600 350 Q600 480 738 480 Q876 480 876 350 L876 0 Z" transform="translate(296,0) scale(0.024,-0.024)" fill="#C75230" fill-rule="evenodd"/>
  </g>

  <!-- "LINUX" subtitle -->
  <g transform="translate(80, 200)">
    <path d="M137 0V1409H432V228H1188V0Z" transform="translate(0,0) scale(0.0086,-0.0086)" fill="#888780"/>
    <path d="M137 0V1409H432V0Z" transform="translate(14,0) scale(0.0086,-0.0086)" fill="#888780"/>
    <path d="M995 0 381 1085Q399 927 399 831V0H137V1409H474L1097 315Q1079 466 1079 590V1409H1341V0Z" transform="translate(22,0) scale(0.0086,-0.0086)" fill="#888780"/>
    <path d="M723 -20Q432 -20 277.5 122.0Q123 264 123 528V1409H418V551Q418 384 497.5 297.5Q577 211 731 211Q889 211 974.0 301.5Q1059 392 1059 561V1409H1354V543Q1354 275 1188.5 127.5Q1023 -20 723 -20Z" transform="translate(38,0) scale(0.0086,-0.0086)" fill="#888780"/>
    <path d="M1038 0 684 561 330 0H18L506 741L59 1409H371L684 911L997 1409H1307L879 741L1348 0Z" transform="translate(54,0) scale(0.0086,-0.0086)" fill="#888780"/>
  </g>

  <!-- Tagline -->
  <text x="80" y="270" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="400" fill="#3d2e1f" letter-spacing="-0.2">Where Linux Feels at Home</text>

  <!-- Description -->
  <text x="80" y="320" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="17" fill="#6b5b4d" letter-spacing="0">
    <tspan x="80" dy="0">Atomic, immutable desktop built on AlmaLinux 10</tspan>
    <tspan x="80" dy="26">with MATE Desktop. Enterprise-grade stability,</tspan>
    <tspan x="80" dy="26">automatic updates, instant rollback.</tspan>
  </text>

  <!-- Feature badges -->
  <g transform="translate(80, 415)">
    <!-- Badge: AlmaLinux 10 -->
    <rect x="0" y="0" width="145" height="36" rx="18" fill="#fdf0ec" stroke="#f4bdad" stroke-width="1"/>
    <text x="72" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c75230" text-anchor="middle">AlmaLinux 10</text>

    <!-- Badge: MATE Desktop -->
    <rect x="155" y="0" width="148" height="36" rx="18" fill="#fdf0ec" stroke="#f4bdad" stroke-width="1"/>
    <text x="229" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c75230" text-anchor="middle">MATE Desktop</text>

    <!-- Badge: Atomic -->
    <rect x="313" y="0" width="100" height="36" rx="18" fill="#fdf0ec" stroke="#f4bdad" stroke-width="1"/>
    <text x="363" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c75230" text-anchor="middle">Atomic</text>

    <!-- Badge: AMD GPU -->
    <rect x="423" y="0" width="110" height="36" rx="18" fill="#fdf0ec" stroke="#f4bdad" stroke-width="1"/>
    <text x="478" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c75230" text-anchor="middle">AMD GPU</text>
  </g>

  <!-- URL -->
  <text x="80" y="505" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" fill="#9c8b7a" letter-spacing="0.5">querencialinux.org</text>

  <!-- Right side: Terminal mockup -->
  <g clip-path="url(#round-terminal)">
    <!-- Terminal background -->
    <rect x="640" y="175" width="480" height="280" rx="12" fill="#282a36"/>

    <!-- Terminal title bar -->
    <rect x="640" y="175" width="480" height="36" fill="#21222c"/>

    <!-- Window dots -->
    <circle cx="662" cy="193" r="6" fill="#ff5f57"/>
    <circle cx="682" cy="193" r="6" fill="#ffbd2e"/>
    <circle cx="702" cy="193" r="6" fill="#28c941"/>

    <!-- Title text -->
    <text x="880" y="198" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6272a4" text-anchor="middle">mate-terminal</text>

    <!-- Terminal content -->
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#f8f8f2">
      <tspan x="660" y="235" fill="#6272a4"># Install from any bootc system</tspan>
      <tspan x="660" y="258" fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">sudo bootc switch \</tspan>
      <tspan x="680" y="278" fill="#ff79c6">ghcr.io/endegelaende/</tspan>
      <tspan x="680" y="298" fill="#ff79c6">  querencia-linux:latest</tspan>
      <tspan x="660" y="325" fill="#6272a4">Pulling manifest...</tspan>
      <tspan x="660" y="348" fill="#50fa7b">✓</tspan><tspan fill="#f8f8f2"> Queued for next boot.</tspan>
      <tspan x="660" y="371" fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">sudo reboot</tspan>
    </text>
  </g>

  <!-- Terminal shadow -->
  <rect x="640" y="455" width="480" height="2" rx="1" fill="#c75230" opacity="0.15"/>

  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
